<!-- Alert Message -->
<div 
  *ngIf="visible" 
  class="alert"
  [ngClass]="{
    'alert-success': type === 'success',
    'alert-error': type === 'error',
    'alert-warning': type === 'warning',
    'alert-info': type === 'info',
    'alert-compact': compact
  }"
  role="alert">
  
  <div class="alert-content">
    <!-- Icono -->
    <i [class]="getIcon()" class="alert-icon"></i>
    
    <!-- Mensaje -->
    <div class="alert-message">
      <!-- Prioridad: contenido proyectado > message -->
      <ng-content>{{ message }}</ng-content>
    </div>
    
    <!-- Botón cerrar -->
    <button 
      *ngIf="dismissible" 
      type="button" 
      class="alert-close" 
      (click)="dismiss()"
      aria-label="Cerrar alerta">
      <i class="cil-x"></i>
    </button>
  </div>
</div>
